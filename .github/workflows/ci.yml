name: LuxeStay CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  packages: write

jobs:
  test-and-build:
    name: Backend Test & Docker Build Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci

      - name: Run Jest API Tests
        run: |
          cd backend
          npm test

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase Repository Owner
        id: repo_owner
        run: |
          echo "owner_lowercase=${OWNER,,}" >> ${GITHUB_OUTPUT}
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ steps.repo_owner.outputs.owner_lowercase }}/luxestay-backend:latest
            ghcr.io/${{ steps.repo_owner.outputs.owner_lowercase }}/luxestay-backend:${{ github.sha }}

      - name: Build and Push Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ steps.repo_owner.outputs.owner_lowercase }}/luxestay-frontend:latest
            ghcr.io/${{ steps.repo_owner.outputs.owner_lowercase }}/luxestay-frontend:${{ github.sha }}

