name: LuxeStay CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-build:
    name: Backend Test & Docker Build Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci

      - name: Run Jest API Tests
        run: |
          cd backend
          npm test

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Backend Docker Build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: luxestay-backend:test

      - name: Verify Frontend Docker Build
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: luxestay-frontend:test
