server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend container
    # Since our compose network connects them, we can proxy /api/ requests
    # directly to http://backend:5000/api if needed.
    # But currently, script.js makes direct requests to http://localhost:5000/api.
    # Direct requests are fine and standard for this local sandbox.
}
